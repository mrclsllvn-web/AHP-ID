<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kemasin.id</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f8fafc;color:#111827}
header{background:#fff;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.logo{font-size:24px;font-weight:bold;color:#2563eb}
.hero{background:linear-gradient(135deg,#2563eb,#38bdf8);padding:90px 20px;text-align:center;color:white}
.section{max-width:1200px;margin:auto;padding:50px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:18px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
footer{background:#0f172a;color:white;padding:40px 20px;text-align:center}
</style>
</head>
<body>
<header><div class="logo">Kemasin.id</div></header>
<section class="hero">
<h1>Supplier Plastik & Packaging untuk UMKM</h1>
<p>Bubble wrap • ziplock • standing pouch • grosir & ecer</p>
</section>
<section class="section">
<div class="grid">
<div class="card"><h3>Bubble Wrap Jumbo</h3><p>Harga grosir & ecer tersedia.</p></div>
<div class="card"><h3>Ziplock</h3><p>Berbagai ukuran untuk UMKM.</p></div>
<div class="card"><h3>Standing Pouch</h3><p>Cocok untuk snack & frozen food.</p></div>
</div>
</section>
<footer>© 2026 Kemasin.id • Yogyakarta</footer>
</body>
</html>
